services:
  spark-lab:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: trabalho-eng-dados-spark-lab
    env_file:
      - .env
    ports:
      - "8888:8888" # Jupyter Lab
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      - SPARK_HOME=/usr/local/lib/python3.11/site-packages/pyspark
      - PYTHONPATH=/app
    stdin_open: true
    tty: true
  airflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: trabalho-eng-dados-airflow
    env_file:
      - .env
    depends_on:
      - minio
    ports:
      - "8080:8080" # Airflow UI
    volumes:
      - .:/app
      - ./dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - papermill-output:/opt/airflow/papermill-output
    working_dir: /app
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=true
      - AIRFLOW_ADMIN_USER=${AIRFLOW_ADMIN_USER:-admin}
      - AIRFLOW_ADMIN_PASSWORD=${AIRFLOW_ADMIN_PASSWORD:-admin}
      - SPARK_HOME=/home/airflow/.local/lib/python3.11/site-packages/pyspark
      - PYTHONPATH=/app
    command:
      - bash
      - -c
      - |
        set -e
        airflow db migrate
        airflow users create \
          --username "$${AIRFLOW_ADMIN_USER:-admin}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          --firstname Engenharia \
          --lastname Dados \
          --role Admin \
          --email admin@example.com || true
        airflow scheduler &
        exec airflow webserver --port 8080
  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    container_name: trabalho-eng-dados-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9020:9000"
      - "9021:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
  dashboard:
    build:
      context: ./dashboard
      dockerfile: docker/Dockerfile
    container_name: trabalho-eng-dados-dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - MINIO_DASHBOARD_ENDPOINT=http://minio:9000

volumes:
  minio-data:
  airflow-logs:
  papermill-output:
