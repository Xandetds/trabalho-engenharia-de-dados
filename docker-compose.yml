services:
  spark-lab:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: trabalho-eng-dados-spark-lab
    ports:
      - "8888:8888" # Jupyter Lab
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      - SPARK_HOME=/usr/local/lib/python3.11/site-packages/pyspark
      - PYTHONPATH=/app
    stdin_open: true
    tty: true
