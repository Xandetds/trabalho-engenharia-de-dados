services:
  spark-lab:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: trabalho-eng-dados-spark-lab
    ports:
      - "8888:8888" # Jupyter Lab
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      - SPARK_HOME=/usr/local/lib/python3.11/site-packages/pyspark
      - PYTHONPATH=/app
    stdin_open: true
    tty: true
  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    container_name: trabalho-eng-dados-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9020:9000"
      - "9021:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
  dashboard:
    build:
      context: ./dashboard
      dockerfile: docker/Dockerfile
    container_name: trabalho-eng-dados-dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - MINIO_DASHBOARD_ENDPOINT=http://minio:9000

volumes:
  minio-data:
